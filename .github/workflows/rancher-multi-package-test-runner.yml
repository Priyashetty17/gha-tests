name: Rancher Test Runner with Qase Reporting

on:
  workflow_dispatch:
    inputs:
      rancher_host:
        description: "Rancher cluster host (e.g. mycluster.qa.rancher.space)"
        required: true
      admin_token:
        description: "Admin token for Rancher API access"
        required: true
      cluster_name:
        description: "Downstream cluster name"
        required: true
      test_packages:
        description: "Comma-separated test package paths (e.g. validation/rbac,validation/projects)"
        required: true
      run_all_tests:
        description: "Run all test files in the package?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      test_files:
        description: "Specific test files (space-separated)"
        required: false
      exclude_test_files:
        description: "Test files to exclude (space-separated)"
        required: false
      report_to_qase:
        description: "Enable Qase reporting"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      qase_test_run_id:
        description: "Qase Test Run ID"
        required: false

permissions:
  contents: read

env:
  REGISTRY_NAME: ${{ vars.REGISTRY_NAME }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      RANCHER_HOST: ${{ github.event.inputs.rancher_host }}
      RANCHER_ADMIN_TOKEN: ${{ github.event.inputs.admin_token }}
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Clone rancher/tests repo
        run: |
          git clone https://github.com/rancher/tests.git rancher-tests
          ls -al rancher-tests

      - name: Create cattle config
        run: |
          cat > cattle-config.yaml <<EOF
          rancher:
            host: "${RANCHER_HOST}"
            adminToken: "${RANCHER_ADMIN_TOKEN}"
            cleanup: true
            insecure: true
            clusterName: "${CLUSTER_NAME}"
          registryInput:
            name: "${REGISTRY_NAME}"
            username: "${REGISTRY_USERNAME}"
            password: "${REGISTRY_PASSWORD}"
          EOF

      - name: Run each test package and report
        working-directory: rancher-tests
        env:
          CATTLE_TEST_CONFIG: ${{ github.workspace }}/cattle-config.yaml
        run: |
          IFS=',' read -ra PACKAGES <<< "${{ github.event.inputs.test_packages }}"
          for PACKAGE in "${PACKAGES[@]}"; do
            echo "🔎 Testing package: $PACKAGE"
            cd "$PACKAGE" || { echo "❌ Package $PACKAGE not found"; cd ..; continue; }

            if [ "${{ github.event.inputs.run_all_tests }}" = "true" ]; then
              TEST_FILES=$(ls *.go | grep -v 'deprecated')
              if [ -n "${{ github.event.inputs.exclude_test_files }}" ]; then
                for exclude in ${{ github.event.inputs.exclude_test_files }}; do
                  TEST_FILES=$(echo "$TEST_FILES" | tr ' ' '\n' | grep -v "^$exclude$" | tr '\n' ' ')
                done
              fi
            else
              if [ -z "${{ github.event.inputs.test_files }}" ]; then
                echo "❌ test_files is required when run_all_tests is false"
                cd ../..
                continue
              fi
              TEST_FILES="${{ github.event.inputs.test_files }}"
            fi

            echo "🧪 Test files: $TEST_FILES"
            for file in $TEST_FILES; do
              cd "$GITHUB_WORKSPACE/rancher-tests/$PACKAGE" || {
              echo "❌ Failed to cd back to package $PACKAGE"
              continue
              }
              
              TAG_LINE=$(grep '^//go:build' "$file" | head -n1)
              TAGS="validation"
              if [ -n "$TAG_LINE" ]; then
                TAGS=$(echo "$TAG_LINE" | grep -oE '[a-zA-Z0-9_.-]+' | grep -vE '^(2\.8|2\.9|2\.10|sanity|stress)' | sort -u | paste -sd' ' -)
              fi

              echo "▶ Running $file with tags: $TAGS"
              gotestsum \
                --format=standard-verbose \
                --junitfile "$GITHUB_WORKSPACE/rancher-tests/results.xml" \
                --jsonfile "$GITHUB_WORKSPACE/rancher-tests/results.json" \
                -- -v -tags="$TAGS" -timeout 5h "$file" || echo "⚠️ Test failed in $file"

              if [ "${{ github.event.inputs.report_to_qase }}" = "true" ]; then
                echo "📤 Reporting to Qase"
                export QASE_TEST_RUN_ID="${{ github.event.inputs.qase_test_run_id }}"
                export QASE_AUTOMATION_TOKEN="${{ secrets.QASE_TOKEN }}"

                RESULTS_DIR=$(mktemp -d "${GITHUB_WORKSPACE}/rancher-tests/resultsdir-XXXXXX")
                cp "${GITHUB_WORKSPACE}/rancher-tests/results.json" "$RESULTS_DIR/results.json"

                echo "🔧 Building Qase reporter"
                chmod +x "${GITHUB_WORKSPACE}/rancher-tests/validation/pipeline/scripts/build_qase_reporter.sh"
                "${GITHUB_WORKSPACE}/rancher-tests/validation/pipeline/scripts/build_qase_reporter.sh" || exit 1

                REPORTER_PATH="${GITHUB_WORKSPACE}/rancher-tests/validation/reporter"

                if [ ! -f "$REPORTER_PATH" ]; then
                  echo "❌ Reporter binary not found at $REPORTER_PATH"
                  exit 1
                fi

                cd "$RESULTS_DIR"
                echo "🚀 Running reporter"
                chmod +x "$REPORTER_PATH"
                "$REPORTER_PATH" --results results.json
              fi

              echo "🧹 Cleaning up old result files"
              rm -f "${GITHUB_WORKSPACE}/rancher-tests/results.xml" "${GITHUB_WORKSPACE}/rancher-tests/results.json"
            done
            cd "$GITHUB_WORKSPACE/rancher-tests"
          done
