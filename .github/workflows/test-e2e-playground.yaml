name: Tests E2E Playground

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      kubeconfig_source:
        description: Cluster source (create host cluster in workflow or use provided kubeconfig secret)
        required: true
        type: choice
        options:
          - create-in-workflow
          - provide-kubeconfig
        default: create-in-workflow
      run_mode:
        description: Test run mode (auto picks targeted when a test target is provided)
        required: true
        type: choice
        options:
          - auto
          - full-suite
          - targeted
        default: auto
      full_suite_profile:
        description: Full-suite profile (used only when run_mode=full-suite)
        required: true
        type: choice
        options:
          - regular
          - slow
          - all
        default: regular
      test_file:
        description: Optional e2e test filename only (example cluster_create_test.go)
        required: false
        type: string
        default: ""
      test_case_name:
        description: Optional test case name to run (example creates nodes with the worker role)
        required: false
        type: string
        default: ""
      kubernetes_version:
        description: k3s Kubernetes version when kubeconfig_source=create-in-workflow
        required: true
        type: string
        default: v1.35.3

permissions:
  contents: read

jobs:
  tests-e2e-playground:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rancher/k3k
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: rancher/k3k
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "./go.mod"
          cache-dependency-path: "**/*.sum"

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@5d1d628ac86668c8f944c8c491c3d1ab86b3bed4 # v2.28.1

      - name: Setup environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/covdata"

          echo "COVERAGE=true" >> "$GITHUB_ENV"
          echo "GOCOVERDIR=${GITHUB_WORKSPACE}/covdata" >> "$GITHUB_ENV"
          echo "REPO=ttl.sh/$(uuidgen | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "VERSION=1h" >> "$GITHUB_ENV"

      - name: Create k3s cluster in workflow
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.kubeconfig_source == 'create-in-workflow' }}
        shell: bash
        run: |
          set -euo pipefail
          k3s_version="v1.35.3"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            k3s_version="${{ inputs.kubernetes_version }}"
          fi

          echo "K3S_HOST_VERSION=${k3s_version}+k3s1" >> "$GITHUB_ENV"
          curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=${k3s_version}+k3s1 INSTALL_K3S_EXEC="--write-kubeconfig-mode=644" sh -s -
          echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "$GITHUB_ENV"

      - name: Use provided kubeconfig from secret
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.kubeconfig_source == 'provide-kubeconfig' }}
        shell: bash
        env:
          HOST_CLUSTER_KUBECONFIG_B64: ${{ secrets.HOST_CLUSTER_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          echo "::add-mask::${HOST_CLUSTER_KUBECONFIG_B64}"
          if [[ -z "${HOST_CLUSTER_KUBECONFIG_B64}" ]]; then
            echo "HOST_CLUSTER_KUBECONFIG_B64 secret is required when kubeconfig_source=provide-kubeconfig"
            exit 1
          fi
          KCFG_PATH="${RUNNER_TEMP}/host-kubeconfig.yaml"
          echo "${HOST_CLUSTER_KUBECONFIG_B64}" | base64 -d > "${KCFG_PATH}"
          chmod 600 "${KCFG_PATH}"
          echo "KUBECONFIG=${KCFG_PATH}" >> "$GITHUB_ENV"

      - name: Preflight cluster checks
        shell: bash
        run: |
          set -euo pipefail
          kubectl version --client=true
          kubectl get ns >/dev/null

      - name: Build and package and push dev images
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.kubeconfig_source == 'create-in-workflow' }}
        env:
          REPO: ${{ env.REPO }}
          VERSION: ${{ env.VERSION }}
        run: |
          make build
          make package
          make push

      - name: Install k3k
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.kubeconfig_source == 'create-in-workflow' }}
        env:
          REPO: ${{ env.REPO }}
          VERSION: ${{ env.VERSION }}
        run: make install

      - name: Run e2e tests
        shell: bash
        run: |
          set -euo pipefail

          mode="full-suite"
          profile="regular"
          test_file=""
          test_case_name=""

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            mode="${{ inputs.run_mode }}"
            profile="${{ inputs.full_suite_profile }}"
            test_file="${{ inputs.test_file }}"
            test_case_name="${{ inputs.test_case_name }}"
          fi

          has_target="false"
          if [[ -n "${test_file}" || -n "${test_case_name}" ]]; then
            has_target="true"
          fi

          label_filter=""

          case "${mode}" in
            auto)
              if [[ "${has_target}" == "true" ]]; then
                label_filter='e2e'
              else
                label_filter='e2e && !slow'
              fi
              ;;
            targeted)
              label_filter='e2e'
              ;;
            full-suite)
              case "${profile}" in
                regular) label_filter='e2e && !slow' ;;
                slow) label_filter='e2e && slow' ;;
                all) label_filter='e2e' ;;
                *)
                  echo "Unsupported full_suite_profile: ${profile}"
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "Unsupported run_mode: ${mode}"
              exit 1
              ;;
          esac

          ginkgo_args=(
            "-v"
            "-r"
            "--coverprofile=cover.out"
            "--coverpkg=./..."
            "--label-filter=${label_filter}"
          )

          if [[ -n "${test_file}" ]]; then
            ginkgo_args+=("--focus-file=tests/e2e/${test_file}")
          fi

          if [[ -n "${test_case_name}" ]]; then
            ginkgo_args+=("--focus=${test_case_name}")
          fi

          go run github.com/onsi/ginkgo/v2/ginkgo@v2.28.1 "${ginkgo_args[@]}" tests/e2e

      - name: Convert coverage data
        run: go tool covdata textfmt -i=${GOCOVERDIR} -o ${GOCOVERDIR}/cover.out

      - name: Upload coverage reports to Codecov (controller)
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${GOCOVERDIR}/cover.out
          flags: controller

      - name: Upload coverage reports to Codecov (e2e)
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cover.out
          flags: e2e

      - name: Export k3s logs
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.kubeconfig_source == 'create-in-workflow') }}
        run: journalctl -u k3s -o cat --no-pager > /tmp/k3s.log

      - name: Export k3k logs
        if: always()
        run: kubectl logs -n k3k-system -l "app.kubernetes.io/name=k3k" --tail=-1 > /tmp/k3k.log

      - name: Archive k3s logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.kubeconfig_source == 'create-in-workflow') }}
        with:
          name: e2e-playground-k3s-logs
          path: /tmp/k3s.log

      - name: Archive k3k logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: e2e-playground-k3k-logs
          path: /tmp/k3k.log

      - name: Cleanup host kubeconfig file
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/host-kubeconfig.yaml"
